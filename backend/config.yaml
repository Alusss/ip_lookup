# =============================================================================
# IP Lookup 后端配置文件
# -----------------------------------------------------------------------------
# 所有配置均支持热加载（修改保存后自动生效，无需重启）。
# 除 YAML 外，每项均可通过同名大写环境变量覆盖（如 RATE_ENABLED）。
# 标注「推荐值」为大多数场景的合理默认；标注「生产建议」需按实际调整。
# =============================================================================

# -----------------------------------------------------------------------------
# 监听地址
# -----------------------------------------------------------------------------
listen_addr_v4: 127.0.0.1   # IPv4 监听地址。反代部署保持 127.0.0.1；直连公网填 0.0.0.0
listen_addr_v6: "::1"        # IPv6 监听地址。反代部署保持 ::1；直连公网填 ::
port_v4: 20011                # IPv4 服务端口（推荐值）
port_v6: 20012                # IPv6 服务端口（推荐值）

# -----------------------------------------------------------------------------
# 限速（令牌桶）
# -----------------------------------------------------------------------------
rate_enabled: true           # 限速总开关。调试或特殊情况下可临时置 false 完全关闭限速
rate_mode: "both"            # 限速策略：both=per_ip+global | per_ip=仅按 IP | global=仅全局
rate_per_ip: 10              # 单 IP 每分钟最大请求数（推荐值；公开 API 建议 10-30）
rate_per_ip_burst: 5         # 单 IP 突发上限（推荐值；通常为 rate_per_ip 的一半）
rate_global: 5000            # 全局每秒最大请求数（推荐值；按机器容量调整）
rate_global_burst: 5000      # 全局突发上限（推荐值；通常等于 rate_global）
rate_cleanup_interval: 10m    # 过期 limiter 清理周期（推荐值）

# -----------------------------------------------------------------------------
# API 广告（curl 纯文本响应 + / 与 /all 的 JSON 响应 ad 字段）
# -----------------------------------------------------------------------------
api_ad_enabled: true         # 是否在纯文本响应与 JSON 响应中附带广告
api_ad_text_zh: "🔥 阿里云省钱攻略，大额优惠券领取通道 ↗"
api_ad_url_zh: "https://www.aliyun.com/minisite/goods?userCode=lj93i1wd"
api_ad_text_en: "Recommended VPN service for privacy"
api_ad_url_en: "https://example.com/en/vpn"

# -----------------------------------------------------------------------------
# Web 广告（浏览器页面顶部广告栏，通过 X-Ad-* 头下发）
# -----------------------------------------------------------------------------
web_ad_enabled: true
web_ad_text_zh: "🔥 阿里云省钱攻略，大额优惠券领取通道 ↗"
web_ad_url_zh: "https://www.aliyun.com/minisite/goods?userCode=lj93i1wd"
web_ad_text_en: "Recommended VPN service for privacy"
web_ad_url_en: "https://example.com/en/vpn"

# -----------------------------------------------------------------------------
# 日志
# -----------------------------------------------------------------------------
log_level: warn              # debug | info | warn | error（生产建议 info）
log_file_max_size: 20        # 单个日志文件最大 MB（推荐值）
log_file_max_age: 30         # 日志保留天数（推荐值）
log_file_backups: 7          # 历史日志归档份数（推荐值）
log_ip_masking: true         # 日志中 IP 脱敏（生产建议 true）

# -----------------------------------------------------------------------------
# API 行为
# -----------------------------------------------------------------------------
cors_enabled: true           # 是否发送 CORS 头（跨域调用建议 true）
json_api_enabled: true       # / 路由是否接受 Accept: application/json 返回 JSON
all_api_enabled: true       # /all 路由开关：开则返回 IP+地点+ASN 的 JSON；关则等同 /

# -----------------------------------------------------------------------------
# HTTP 服务器参数
# -----------------------------------------------------------------------------
shutdown_timeout: 15s        # 优雅关闭超时（推荐值）
max_header_bytes: 1024       # 请求头最大字节（推荐值；防头部滥用）
read_timeout: 10s            # 读超时（推荐值）
read_header_timeout: 5s      # 读请求头超时（推荐值）
write_timeout: 10s           # 写超时（推荐值）
idle_timeout: 60s            # 空闲连接超时（推荐值）
max_conns_per_ip: 8          # 单 IP 最大并发连接（推荐值）

# -----------------------------------------------------------------------------
# 代理 / 信任链 / 访问控制
# -----------------------------------------------------------------------------
trusted_proxy_cidrs: "127.0.0.1/32,::1/128"  # 本机反代 CIDR，用于还原 X-Forwarded-For 真实 IP
ip_denylist: ""              # IP 黑名单，逗号分隔，支持 CIDR，如 "1.2.3.4,10.0.0.0/8"
ua_denylist: ""              # User-Agent 黑名单，逗号分隔，子串匹配，如 "badbot,scraper"

# -----------------------------------------------------------------------------
# Cloudflare 边缘 IP 段
# -----------------------------------------------------------------------------
cf_cidr_path: /etc/ip-lookup/cf-cidrs.txt  # CF CIDR 列表文件（由 update-cloudflare-ip.sh 生成）
cf_cidr_reload_interval: 5m                # 兜底定时重载周期（主机制为 fsnotify 文件监听；防事件丢失）
cf_only: false                             # 仅接受 CF/反代来源的请求：开启后直连后端的非 CF/非反代请求返回 403

# -----------------------------------------------------------------------------
# GeoIP（MaxMind GeoLite2）
# -----------------------------------------------------------------------------
geoip_enabled: true        # 是否启用 GeoIP 查询
geoip_db_path: /var/lib/ip-lookup/GeoLite2-City.mmdb   # City 库路径（必需；含 zh-CN 地名）
geoip_asn_db_path: /var/lib/ip-lookup/GeoLite2-ASN.mmdb # ASN 库路径（可选；提供 ASN 编号+组织名）

# -----------------------------------------------------------------------------
# 监控 / 自检（指标自带的告警 webhook）
# -----------------------------------------------------------------------------
metrics_listen_addr: 127.0.0.1:20013  # Prometheus 指标暴露地址（仅本地）

monitoring:
  enabled: true                       # 是否启用自检告警
  check_interval: 60s                  # 自检周期（推荐值）
  alert_cooldown: 10m                  # 同一告警冷却时间（推荐值）
  alert_webhook_url: ""                # 告警 webhook 地址，留空则不推送
  alert_webhook_type: "generic"        # generic | feishu | dingtalk
  error_rate_threshold: 0.05           # 错误率告警阈值（推荐值 5%）
  p99_latency_threshold_ms: 2000       # P99 延迟告警阈值（推荐值 2s）
  rate_limit_hit_rate_threshold: 0.10  # 限速命中率告警阈值（推荐值 10%）
