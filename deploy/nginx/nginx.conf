# IP Lookup Nginx Configuration
# Usage: Place in /etc/nginx/nginx.conf or include from sites-enabled/

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
	worker_connections 1024;
	multi_accept on;
	use epoll;
}

http {
	include /etc/nginx/mime.types;
	default_type application/octet-stream;

	# Cloudflare Real IP (auto-synced, DO NOT hardcode)
	include /etc/nginx/conf.d/cloudflare-realip.conf;

	# Logging
	log_format json escape=json '{'
		'"ts":"$time_iso8601",'
		'"ip":"$realip_remote_addr",'
		'"method":"$request_method",'
		'"path":"$uri",'
		'"status":$status,'
		'"latency_ms":$request_time,'
		'"ua":"$http_user_agent",'
		'"bytes":$body_bytes_sent'
	'}';
	access_log /var/log/nginx/access.log json buffer=32k flush=5s;
	error_log /var/log/nginx/error.log warn;

	# Security
	server_tokens off;
	client_max_body_size 0;
	client_body_buffer_size 1k;
	client_header_buffer_size 1k;
	large_client_header_buffers 2 1k;
	keepalive_requests 100;
	keepalive_timeout 30s;

	# Timeouts
	client_header_timeout 5s;
	client_body_timeout 10s;
	send_timeout 10s;

	# Rate limiting
	limit_req_zone $binary_remote_addr zone=perip:10m rate=10r/m;
	limit_req_zone $server_name zone=global:10m rate=1000r/s;
	limit_req_status 429;

	# Compression
	gzip on;
	gzip_types text/plain text/css application/json;
	gzip_min_length 256;
	gzip_proxied any;

	# Proxy settings
	proxy_http_version 1.1;
	proxy_set_header Connection "";
	proxy_buffering off;
	proxy_request_buffering off;

	# Upstreams
	upstream backend_v4 {
		server 127.0.0.1:8080 max_conns=256 max_fails=3 fail_timeout=10s;
		keepalive 32;
	}

	upstream backend_v6 {
		server [::1]:8081 max_conns=256 max_fails=3 fail_timeout=10s;
		keepalive 32;
	}

	# IPv4 API: ip4.iohow.com
	server {
		listen 0.0.0.0:443 ssl http2;
		server_name ip4.iohow.com;

		ssl_certificate /etc/nginx/ssl/ip4.iohow.com/fullchain.pem;
		ssl_certificate_key /etc/nginx/ssl/ip4.iohow.com/privkey.pem;
		ssl_protocols TLSv1.2 TLSv1.3;
		ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
		ssl_prefer_server_ciphers off;
		ssl_session_cache shared:SSL:10m;
		ssl_session_timeout 1d;

		# Security headers
		add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
		add_header X-Content-Type-Options "nosniff" always;
		add_header X-Frame-Options "DENY" always;
		add_header Referrer-Policy "strict-origin-when-cross-origin" always;
		add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

		# Rate limiting (on API endpoints; /health and /readyz bypass)
		limit_req zone=perip burst=5 nodelay;
		limit_req zone=global burst=1000 nodelay;

		location /health {
			limit_req off;
			add_header Cache-Control "no-cache";
			proxy_pass http://backend_v4;
			proxy_set_header Host $host;
			proxy_set_header X-Forwarded-For $remote_addr;
			proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
		}

		location /readyz {
			limit_req off;
			add_header Cache-Control "no-cache";
			proxy_pass http://backend_v4;
			proxy_set_header Host $host;
			proxy_set_header X-Forwarded-For $remote_addr;
			proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
		}

		location / {
			add_header Cache-Control "no-cache, must-revalidate";
			proxy_pass http://backend_v4;
			proxy_set_header Host $host;
			proxy_set_header X-Forwarded-For $remote_addr;
			proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
		}
	}

	# IPv6 API: ip6.iohow.com
	server {
		listen [::]:443 ssl http2;
		server_name ip6.iohow.com;

		ssl_certificate /etc/nginx/ssl/ip6.iohow.com/fullchain.pem;
		ssl_certificate_key /etc/nginx/ssl/ip6.iohow.com/privkey.pem;
		ssl_protocols TLSv1.2 TLSv1.3;
		ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
		ssl_prefer_server_ciphers off;
		ssl_session_cache shared:SSL:10m;
		ssl_session_timeout 1d;

		add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
		add_header X-Content-Type-Options "nosniff" always;
		add_header X-Frame-Options "DENY" always;
		add_header Referrer-Policy "strict-origin-when-cross-origin" always;
		add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

		# Rate limiting (on API endpoints; /health and /readyz bypass)
		limit_req zone=perip burst=5 nodelay;
		limit_req zone=global burst=1000 nodelay;

		location /health {
			limit_req off;
			add_header Cache-Control "no-cache";
			proxy_pass http://backend_v6;
			proxy_set_header Host $host;
			proxy_set_header X-Forwarded-For $remote_addr;
			proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
		}

		location /readyz {
			limit_req off;
			add_header Cache-Control "no-cache";
			proxy_pass http://backend_v6;
			proxy_set_header Host $host;
			proxy_set_header X-Forwarded-For $remote_addr;
			proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
		}

		location / {
			add_header Cache-Control "no-cache, must-revalidate";
			proxy_pass http://backend_v6;
			proxy_set_header Host $host;
			proxy_set_header X-Forwarded-For $remote_addr;
			proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
		}
	}

	# HTTP redirect to HTTPS
	server {
		listen 80;
		listen [::]:80;
		server_name ip4.iohow.com ip6.iohow.com;
		return 301 https://$host$request_uri;
	}
}
