<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="title">IP Lookup - Check Your IP Address & IPv6 Connectivity</title>
<meta name="description" content="" data-i18n-attrs="content:desc">
<meta name="keywords" content="IP查询,IPv6检测,我的IP,What is my IP,IP address lookup">
<link rel="canonical" href="https://ip.iohow.com/">
<link rel="alternate" hreflang="zh-CN" href="https://ip.iohow.com/">
<link rel="alternate" hreflang="en" href="https://ip.iohow.com/en/">
<meta property="og:title" content="" data-i18n-attrs="content:og_title">
<meta property="og:description" content="" data-i18n-attrs="content:og_desc">
<meta property="og:type" content="website">
<meta property="og:url" content="https://ip.iohow.com/">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="" data-i18n-attrs="content:og_title">
<meta name="twitter:description" content="" data-i18n-attrs="content:og_desc">
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "IP Lookup",
  "url": "https://ip.iohow.com/",
  "description": "Check your public IP address and test IPv6 connectivity instantly.",
  "applicationCategory": "UtilitiesApplication",
  "operatingSystem": "All"
}
</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f172a;--bg-card:#1e293b;--text:#f1f5f9;--text-secondary:#94a3b8;--accent:#3b82f6;--accent-hover:#2563eb;--success:#22c55e;--error:#ef4444;--border:#334155;--radius:12px;--font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Oxygen,Ubuntu,Cantarell,sans-serif}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;display:flex;flex-direction:column;align-items:center;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
.container{width:100%;max-width:640px;padding:24px 20px;display:flex;flex-direction:column;min-height:100vh}
.ad-bar{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:10px 16px;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;font-size:14px;gap:12px}
.ad-bar a{color:var(--accent);text-decoration:none}
.ad-bar a:hover{text-decoration:underline}
.ad-bar .close-ad{background:none;border:none;color:var(--text-secondary);cursor:pointer;font-size:18px;padding:2px 6px;border-radius:4px;flex-shrink:0}
.ad-bar .close-ad:hover{color:var(--text);background:var(--border)}
.ad-bar.hidden{display:none}
header{text-align:center;margin-bottom:32px}
.logo{display:inline-flex;align-items:center;gap:10px;margin-bottom:8px}
.logo svg{width:36px;height:36px}
.logo h1{font-size:22px;font-weight:600;letter-spacing:-0.3px}
header p{color:var(--text-secondary);font-size:14px}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:28px 24px;margin-bottom:16px}
.card.loading{opacity:.7}
.card.tested{border-color:rgba(59,130,246,.3)}
.ip-display{text-align:center}
.ip-display .label{font-size:13px;color:var(--text-secondary);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.ip-display .ip-address{font-size:32px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-.5px;word-break:break-all;min-height:44px;display:flex;align-items:center;justify-content:center}
.ip-display .ip-address.loading{color:var(--text-secondary)}
.ip-display .status-msg{font-size:13px;margin-top:8px;min-height:20px;transition:opacity .3s}
.ip-display .status-msg.success{color:var(--success)}
.ip-display .status-msg.error{color:var(--error)}
.ip-display .status-msg.idle{opacity:0}
.actions{display:flex;gap:12px;justify-content:center;margin-top:20px}
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:14px;font-weight:500;cursor:pointer;transition:all .2s;font-family:var(--font)}
.btn:hover{background:var(--bg-card);border-color:var(--accent)}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:var(--accent-hover);border-color:var(--accent-hover)}
.btn .spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
.btn.loading .btn-text{opacity:.7}
@keyframes spin{to{transform:rotate(360deg)}}
.ipv6-section h2{font-size:16px;font-weight:600;margin-bottom:4px;text-align:center}
.ipv6-section .ipv6-subtitle{font-size:13px;color:var(--text-secondary);text-align:center;margin-bottom:16px}
.ipv6-content{min-height:40px;display:flex;align-items:center;justify-content:center}
.ipv6-result{padding:16px;border-radius:8px;text-align:center;font-size:14px;width:100%}
.ipv6-result.success{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.2);color:var(--success)}
.ipv6-result.fail{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:var(--error)}
.ipv6-result.loading{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.2);color:var(--accent)}
.ipv6-result.idle{display:none}
footer{border-top:1px solid var(--border);margin-top:auto;text-align:center;padding:20px 0 12px;color:var(--text-secondary);font-size:12px}
footer a{color:var(--text-secondary);text-decoration:none}
footer a:hover{color:var(--text)}
footer .footer-info{margin-bottom:8px}
footer .footer-email{font-size:13px;margin-bottom:4px;display:flex;align-items:center;justify-content:center;gap:4px}
footer .footer-filing{font-size:11px;opacity:.7;margin-top:2px}
footer .footer-filing.hidden{display:none}
footer .footer-links{display:flex;gap:16px;justify-content:center;margin-bottom:6px;flex-wrap:wrap}
@media(max-width:480px){.container{padding:16px 12px}.ip-display .ip-address{font-size:24px}.card{padding:24px 16px}}
@media(prefers-color-scheme:light){:root{--bg:#f8fafc;--bg-card:#ffffff;--text:#0f172a;--text-secondary:#64748b;--border:#e2e8f0}}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
</style>
</head>
<body>
<div class="container">
  <div id="ad-bar" class="ad-bar hidden" role="complementary" aria-label="Advertisement">
    <a id="ad-link" href="" target="_blank" rel="noopener sponsored"></a>
    <button class="close-ad" id="close-ad" aria-label="Close advertisement">&times;</button>
  </div>
  <header>
    <div class="logo">
      <svg viewBox="0 0 36 36" fill="none" aria-hidden="true">
        <circle cx="18" cy="18" r="16" stroke="currentColor" stroke-width="2"/>
        <circle cx="18" cy="18" r="6" fill="currentColor"/>
        <path d="M18 2v6M18 28v6M2 18h6M28 18h6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <h1 data-i18n="site_name">IP Lookup</h1>
    </div>
    <p data-i18n="tagline">Check your public IP address instantly</p>
  </header>
  <main>
    <div id="ipv4-card" class="card ip-display">
      <div class="label"><span data-i18n="ipv4_label">IPv4 Address</span></div>
      <div id="ip-address" class="ip-address loading" data-i18n="loading" aria-live="polite">
        Getting your IP address...
      </div>
      <div id="status-msg" class="status-msg idle" role="status"></div>
      <div class="actions">
        <button class="btn" id="copy-btn" aria-label="Copy IP address" disabled>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="10" height="10" rx="1.5"/><path d="M4 4V2.5A1.5 1.5 0 015.5 1h8A1.5 1.5 0 0115 2.5v8a1.5 1.5 0 01-1.5 1.5H12"/></svg>
          <span data-i18n="copy">Copy</span>
        </button>
        <button class="btn" id="refresh-btn" aria-label="Refresh IP address">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M1 8a7 7 0 0113.3-3M15 8a7 7 0 01-13.3 3"/><path d="M1 2v4h4M15 14v-4h-4"/></svg>
          <span class="btn-text" data-i18n="refresh">Refresh</span>
          <span class="spinner" style="display:none"></span>
        </button>
      </div>
    </div>
    <div id="ipv6-card" class="card ipv6-section">
      <h2 data-i18n="ipv6_title">IPv6 Address</h2>
      <p class="ipv6-subtitle" data-i18n="ipv6_subtitle">Automatically detected</p>
      <div id="ipv6-content" class="ipv6-content">
        <div id="ipv6-result" class="ipv6-result idle" role="status"></div>
      </div>
    </div>
  </main>
  <footer>
    <div class="footer-info">
      <div class="footer-email">
        <span data-i18n="email_label">📧 Email</span>: <span id="email-addr"></span>
      </div>
      <div class="footer-filing hidden" id="footer-filing" lang="zh-CN"></div>
    </div>
    <div class="footer-links">
      <a href="/privacy" data-i18n="privacy">Privacy Policy</a>
      <a href="/docs/what-is-ipv6" data-i18n="learn_ipv6">Learn about IPv6</a>
    </div>
    <p>&copy; <span id="year"></span> IP Lookup</p>
  </footer>
</div>
<script defer src="js/i18n.js"></script>
<script defer src="js/app.js"></script>
</body>
</html>
