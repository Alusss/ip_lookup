<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="title">IP Lookup - Check Your IP Address & IPv6 Connectivity</title>
<meta name="description" content="" data-i18n-attrs="content:desc">
<meta name="keywords" content="IP查询,IPv6检测,我的IP,What is my IP,IP address lookup">
<link rel="canonical" href="https://ip.iohow.com/">
<link rel="alternate" hreflang="zh-CN" href="https://ip.iohow.com/">
<link rel="alternate" hreflang="en" href="https://ip.iohow.com/en/">
<meta property="og:title" content="" data-i18n-attrs="content:og_title">
<meta property="og:description" content="" data-i18n-attrs="content:og_desc">
<meta property="og:type" content="website">
<meta property="og:url" content="https://ip.iohow.com/">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="" data-i18n-attrs="content:og_title">
<meta name="twitter:description" content="" data-i18n-attrs="content:og_desc">
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "IP Lookup",
  "url": "https://ip.iohow.com/",
  "description": "Check your public IP address and test IPv6 connectivity instantly.",
  "applicationCategory": "UtilitiesApplication",
  "operatingSystem": "All"
}
</script>
<link rel="stylesheet" href="/css/base.css">
<style>
.container{width:100%;max-width:640px;margin:0 auto;padding:32px 20px 24px;min-height:100vh}
.ad-bar{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:10px 16px;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;font-size:14px;gap:12px}
.ad-bar a{color:var(--accent)}
.ad-bar a:hover{text-decoration:underline}
.ad-bar .close-ad{background:none;border:none;color:var(--text-secondary);cursor:pointer;font-size:18px;padding:2px 6px;border-radius:4px;flex-shrink:0}
.ad-bar .close-ad:hover{color:var(--text);background:var(--border)}
.ad-bar.hidden{display:none}
header{text-align:center;margin-bottom:28px}
.logo{display:inline-flex;align-items:center;gap:14px;margin-bottom:6px}
.logo svg{width:72px;height:72px}
.logo h1{font-size:60px;font-weight:700;letter-spacing:-1px;line-height:1.1}
header p{color:var(--text-secondary);font-size:17px;margin-top:2px}
main{display:flex;flex-direction:column}
.card{margin-bottom:16px}
.card.loading{opacity:.7}
.ip-display{text-align:center}
.ip-display .label{font-size:15px;color:var(--text-secondary);margin-bottom:10px;font-weight:500;letter-spacing:.2px}
.ip-display .ip-address{font-size:34px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-.5px;word-break:break-all;min-height:44px;display:flex;align-items:center;justify-content:center}
.ip-display .ip-address.loading{color:var(--text-secondary)}
#ipv6-address{font-size:clamp(18px,4.5vw,26px);white-space:nowrap;word-break:normal;display:block;line-height:44px;overflow-x:auto;text-align:center}
.ip-display .status-msg{font-size:13px;margin-top:8px;min-height:20px;transition:opacity .3s}
.ip-display .status-msg.success{color:var(--success)}
.ip-display .status-msg.error{color:var(--error)}
.ip-display .status-msg.idle{opacity:0}
.geo-line{font-size:13px;color:var(--text-secondary);margin-top:6px;min-height:18px}
.geo-line:empty{min-height:0;margin-top:0}
.actions{display:flex;gap:12px;justify-content:center;margin-top:20px}
.btn.loading .btn-text{opacity:.7}
footer{margin-top:32px;padding:0 0 16px;text-align:center;color:var(--text-secondary);font-size:13px}
.knowledge-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center;justify-content:center;padding:0 0 20px;margin-bottom:4px;border-bottom:1px solid var(--border)}
.knowledge-row a{font-size:13px;color:var(--text-secondary);padding:6px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);text-decoration:none;transition:color .2s,border-color .2s,background .2s}
.knowledge-row a:hover{color:var(--accent);border-color:var(--accent);background:var(--accent-soft);text-decoration:none}
.knowledge-row a.kb-more{color:var(--accent);border-color:rgba(99,102,241,.5);font-weight:500}
.footer-main{display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:center;margin-top:16px}
.footer-main .sep{opacity:.4}
.footer-main a{color:var(--text-secondary)}
.footer-main a:hover{color:var(--text)}
.footer-filing{font-size:11px;opacity:.7;margin-top:10px;display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap}
.footer-filing.hidden{display:none}
.footer-filing img{width:14px;height:14px;vertical-align:middle}
@media(max-width:480px){.container{padding:20px 14px 16px}.logo{gap:10px}.logo svg{width:48px;height:48px}.logo h1{font-size:36px}.ip-display .ip-address{font-size:26px}header p{font-size:15px}}
</style>
<script src="js/i18n.js"></script>
</head>
<body>
<div class="container">
  <div id="ad-bar" class="ad-bar hidden" role="complementary" aria-label="Advertisement">
    <a id="ad-link" href="" target="_blank" rel="noopener sponsored"></a>
    <button class="close-ad" id="close-ad" aria-label="Close advertisement">&times;</button>
  </div>
  <header>
    <div class="logo">
      <svg viewBox="0 0 48 48" fill="none" aria-hidden="true">
        <defs><linearGradient id="lg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#818cf8"/><stop offset="1" stop-color="#22d3ee"/></linearGradient></defs>
        <rect x="3" y="3" width="42" height="42" rx="12" stroke="url(#lg)" stroke-width="2"/>
        <path d="M24 24L11 13M24 24L37 13M24 24L11 35M24 24L37 35" stroke="url(#lg)" stroke-width="1.5" opacity="0.55"/>
        <circle cx="24" cy="24" r="4.5" fill="url(#lg)"/>
        <circle cx="11" cy="13" r="2.6" fill="url(#lg)"/>
        <circle cx="37" cy="13" r="2.6" fill="url(#lg)"/>
        <circle cx="11" cy="35" r="2.6" fill="url(#lg)"/>
        <circle cx="37" cy="35" r="2.6" fill="url(#lg)"/>
      </svg>
      <h1 data-i18n="site_name">IP Lookup</h1>
    </div>
    <p data-i18n="tagline">Check your public IP address instantly</p>
  </header>
  <main>
    <div id="ipv4-card" class="card ip-display">
      <div class="label"><span data-i18n="ipv4_label">IPv4 Address</span></div>
      <div id="ip-address" class="ip-address loading" data-i18n="loading" aria-live="polite">
        Getting your IP address...
      </div>
      <div id="geo-line" class="geo-line" aria-live="polite"></div>
      <div id="status-msg" class="status-msg idle" role="status"></div>
      <div class="actions">
        <button class="btn btn-primary" id="copy-btn" aria-label="Copy IP address" disabled>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="10" height="10" rx="1.5"/><path d="M4 4V2.5A1.5 1.5 0 015.5 1h8A1.5 1.5 0 0115 2.5v8a1.5 1.5 0 01-1.5 1.5H12"/></svg>
          <span data-i18n="copy">Copy</span>
        </button>
        <button class="btn" id="refresh-btn" aria-label="Refresh IP address">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M1 8a7 7 0 0113.3-3M15 8a7 7 0 01-13.3 3"/><path d="M1 2v4h4M15 14v-4h-4"/></svg>
          <span class="btn-text" data-i18n="refresh">Refresh</span>
          <span class="spinner" style="display:none"></span>
        </button>
      </div>
    </div>
    <div id="ipv6-card" class="card ip-display">
      <div class="label"><span data-i18n="ipv6_label">IPv6 Address</span></div>
      <div id="ipv6-address" class="ip-address loading" aria-live="polite" data-i18n="ipv6_testing">Testing...</div>
      <div id="ipv6-status" class="status-msg idle" role="status"></div>
      <div class="actions">
        <button class="btn btn-primary" id="ipv6-copy-btn" aria-label="Copy IPv6 address" disabled>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="10" height="10" rx="1.5"/><path d="M4 4V2.5A1.5 1.5 0 015.5 1h8A1.5 1.5 0 0115 2.5v8a1.5 1.5 0 01-1.5 1.5H12"/></svg>
          <span data-i18n="copy">Copy</span>
        </button>
        <button class="btn" id="ipv6-refresh-btn" aria-label="Refresh IPv6 address">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M1 8a7 7 0 0113.3-3M15 8a7 7 0 01-13.3 3"/><path d="M1 2v4h4M15 14v-4h-4"/></svg>
          <span class="btn-text" data-i18n="refresh">Refresh</span>
          <span class="spinner" style="display:none"></span>
        </button>
      </div>
    </div>
  </main>
  <footer>
    <nav class="knowledge-row" aria-label="Knowledge">
      <a href="/docs/what-is-ipv6" data-i18n="kb_ipv6">What is IPv6?</a>
      <a href="/docs/ipv6-test-guide" data-i18n="kb_ipv6_test">IPv6 Test Guide</a>
      <a href="/docs/what-is-ip-address" data-i18n="kb_ip_addr">What is an IP Address?</a>
      <a href="/docs/public-vs-private-ip" data-i18n="kb_pub_priv">Public vs Private IP</a>
      <a class="kb-more" href="/docs/" data-i18n="kb_more">Learn more &rarr;</a>
    </nav>
    <div class="footer-main">
      <a href="/privacy" data-i18n="privacy">Privacy Policy</a>
      <span class="sep">&middot;</span>
      <span><span data-i18n="email_label">Email</span>: <a href="mailto:contact@iohow.com">contact@iohow.com</a></span>
      <span class="sep">&middot;</span>
      <span id="copyright-text"></span>
    </div>
    <div class="footer-filing hidden" id="footer-filing" lang="zh-CN"></div>
  </footer>
</div>
<script defer src="js/app.js"></script>
</body>
</html>
